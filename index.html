<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAUDA Rechner</title>
<meta name="application-name" content="LAUDA Rechner">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LAUDA Rechner">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23111'/%3E%3Ccircle cx='256' cy='256' r='80' fill='none' stroke='white' stroke-width='18'/%3E%3Ctext x='256' y='278' text-anchor='middle' font-family='Arial' font-weight='900' font-size='110' fill='white'%3E%C2%B0%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23111'/%3E%3Ccircle cx='256' cy='256' r='80' fill='none' stroke='white' stroke-width='18'/%3E%3Ctext x='256' y='278' text-anchor='middle' font-family='Arial' font-weight='900' font-size='110' fill='white'%3E%C2%B0%3C/text%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; }

  header { background: #111; color: white; padding: 16px 20px 12px; text-align: center; }
  header .logo { font-size: 26px; font-weight: 900; letter-spacing: -1px; }
  header .logo span { color: #aaa; font-weight: 300; }
  header p { font-size: 12px; color: #aaa; margin-top: 3px; }

  .tabs { display: flex; background: #222; }
  .tab { flex: 1; padding: 12px; text-align: center; color: #aaa; font-size: 13px; font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: white; border-bottom-color: white; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card h2 { font-size: 14px; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

  label { display: block; font-size: 14px; color: #444; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }

  input[type="datetime-local"], input[type="number"], input[type="text"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
    border-radius: 8px; font-size: 15px; background: #fafafa;
  }
  input:focus { outline: none; border-color: #111; background: white; }

  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }

  .sondergebuehren { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid #eee; border-radius: 8px; cursor: pointer; transition: border-color 0.2s; }
  .checkbox-item:hover { border-color: #bbb; }
  .checkbox-item input { width: 18px; height: 18px; cursor: pointer; accent-color: #111; }
  .checkbox-item .item-info { flex: 1; }
  .checkbox-item .item-label { font-size: 14px; }
  .checkbox-item .item-price { font-size: 12px; color: #888; }

  .result-card { background: #111; color: white; border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .result-card h2 { color: #aaa; font-size: 13px; text-transform: uppercase; margin-bottom: 14px; }
  .result-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid #333; }
  .result-row .label { color: #ccc; }
  .result-row .value { color: white; font-weight: 500; }
  .result-row.total { font-size: 20px; font-weight: bold; border-top: 2px solid #444; padding-top: 12px; margin-top: 6px; border-bottom: none; }

  .save-btn { width: 100%; padding: 14px; background: #111; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 14px; transition: background 0.2s; }
  .save-btn:hover { background: #333; }
  .save-btn:active { background: #555; }

  .badge { display: inline-block; background: #fee2e2; color: #b91c1c; font-size: 11px; font-weight: bold; padding: 2px 7px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .badge.ok { background: #dcfce7; color: #15803d; }

  .hinweis { background: #fff8e1; border-left: 4px solid #f59e0b; border-radius: 6px; padding: 10px 12px; font-size: 13px; color: #666; margin-bottom: 16px; }

  textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; resize: vertical; min-height: 60px; font-family: Arial, sans-serif; }
  textarea:focus { outline: none; border-color: #111; background: white; }

  /* Historie */
  .search-box { position: relative; margin-bottom: 14px; }
  .search-box input { padding-left: 36px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }

  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .history-header span { font-size: 13px; color: #888; }
  .clear-all { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 5px 10px; font-size: 12px; color: #888; cursor: pointer; }
  .clear-all:hover { border-color: #b91c1c; color: #b91c1c; }

  .history-item { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); position: relative; }
  .history-item .hi-title { font-weight: bold; font-size: 15px; color: #111; margin-bottom: 3px; padding-right: 30px; }
  .history-item .hi-date { font-size: 12px; color: #888; margin-bottom: 8px; }
  .history-item .hi-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .hi-tag { background: #f0f4f8; border-radius: 20px; padding: 3px 10px; font-size: 12px; color: #555; }
  .hi-tag.price { background: #111; color: white; font-weight: bold; }
  .hi-delete { position: absolute; top: 12px; right: 12px; background: #fee2e2; border: none; border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer; color: #b91c1c; display: flex; align-items: center; justify-content: center; }
  .hi-delete:hover { background: #fca5a5; }

  .no-history { text-align: center; color: #aaa; padding: 40px 20px; font-size: 14px; }
  .no-history .icon { font-size: 40px; margin-bottom: 10px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">°<span>LAUDA</span></div>
  <p>Carsharing Kostenrechner</p>
</header>

<div class="tabs">
  <div class="tab active" id="tab-btn-rechner" onclick="showTab('rechner', this)">🧮 Rechner</div>
  <div class="tab" id="tab-btn-historie" onclick="showTab('historie', this)">📋 Historie</div>
</div>

<!-- RECHNER -->
<div class="tab-content active" id="tab-rechner">
<div class="container">

  <div class="card">
    <h2>📅 Buchungszeitraum</h2>
    <div class="row">
      <div><label>Start</label><input type="datetime-local" id="start" /></div>
      <div><label>Ende</label><input type="datetime-local" id="end" /></div>
    </div>
    <div id="dauer-info" style="margin-top:10px;font-size:13px;color:#666;"></div>
  </div>

  <div class="card">
    <h2>🛣️ Kilometer</h2>
    <label>Geschätzte Fahrtstrecke (km)</label>
    <input type="number" id="km" placeholder="z.B. 50" min="0" value="0" />
  </div>

  <div class="card">
    <h2>📝 Notiz (für die Historie)</h2>
    <textarea id="notiz" placeholder="z.B. Shen Yun, Arzttermin Frankfurt, Familienausflug …"></textarea>
  </div>

  <div class="card">
    <h2>⚠️ Sondergebühren</h2>
    <div class="sondergebuehren">
      <label class="checkbox-item"><input type="checkbox" data-price="25" /><div class="item-info"><div class="item-label">Reinigung (unverhältnismäßig)</div><div class="item-price">25,00 €</div></div></label>
      <label class="checkbox-item"><input type="checkbox" data-price="75" /><div class="item-info"><div class="item-label">Reinigung + Desinfektion (Tier, Rauchen)</div><div class="item-price">75,00 €</div></div></label>
      <label class="checkbox-item"><input type="checkbox" data-price="15" /><div class="item-info"><div class="item-label">Missachtung Tankregelung</div><div class="item-price">15,00 €</div></div></label>
      <label class="checkbox-item"><input type="checkbox" data-price="10" /><div class="item-info"><div class="item-label">Verlust/Beschädigung Ladekarte</div><div class="item-price">10,00 €</div></div></label>
      <label class="checkbox-item"><input type="checkbox" data-price="120" id="cb-unfall" /><div class="item-info"><div class="item-label">Schadensabwicklung (Unfall)</div><div class="item-price">120,00 € + 300 € Selbstbeteiligung</div></div></label>
    </div>
  </div>

  <div class="result-card">
    <h2>💶 Kostenschätzung</h2>
    <div id="result-rows"><div class="result-row"><span class="label">Bitte Zeitraum eingeben</span><span class="value">–</span></div></div>
  </div>

  <button class="save-btn" onclick="speichern()">💾 In Historie speichern</button>

  <div class="hinweis">ℹ️ Max. Buchungsdauer: <strong>36 Stunden</strong>. Strom inklusive. Alle Preise inkl. MwSt. Stand Januar 2023.</div>

</div>
</div>

<!-- HISTORIE -->
<div class="tab-content" id="tab-historie">
<div class="container">

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="suche" placeholder="Suchen nach Notiz, Datum, Betrag …" oninput="renderHistorie()" />
  </div>

  <div class="history-header">
    <span id="history-count"></span>
    <button class="clear-all" onclick="alleLoeschen()">Alle löschen</button>
  </div>

  <div id="historie-liste"></div>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STUNDE = 3.00, TAG = 30.00, KM_TARIF = 0.22, BUCHUNG = 0.50;

  function pad(n) { return String(n).padStart(2,'0'); }
  function nowStr() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  // Standardwerte setzen
  document.getElementById('start').value = nowStr();
  const e2 = new Date(Date.now() + 2*3600000);
  document.getElementById('end').value = `${e2.getFullYear()}-${pad(e2.getMonth()+1)}-${pad(e2.getDate())}T${pad(e2.getHours())}:${pad(e2.getMinutes())}`;

  function showTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'historie') renderHistorie();
  }

  function berechne() {
    const startVal = document.getElementById('start').value;
    const endVal = document.getElementById('end').value;
    const km = parseFloat(document.getElementById('km').value) || 0;
    if (!startVal || !endVal) return null;

    const start = new Date(startVal), end = new Date(endVal);
    if (end <= start) {
      document.getElementById('result-rows').innerHTML = `<div class="result-row"><span class="label" style="color:#f87171;">Ende muss nach Start liegen</span></div>`;
      document.getElementById('dauer-info').innerHTML = '';
      return null;
    }

    const diffH = (end - start) / 3600000;
    const tage = Math.floor(diffH / 24);
    const restStunden = Math.ceil(diffH - tage * 24);
    const stundenGesamt = Math.ceil(diffH);
    const ueberschreitung = diffH > 36;

    let zeitkosten = tage * TAG + restStunden * STUNDE;
    if (stundenGesamt * STUNDE < zeitkosten) zeitkosten = stundenGesamt * STUNDE;

    const kmKosten = km * KM_TARIF;
    let sonder = 0;
    document.querySelectorAll('.sondergebuehren input[type=checkbox]').forEach(cb => {
      if (cb.checked) sonder += parseFloat(cb.dataset.price);
    });
    if (document.getElementById('cb-unfall').checked) sonder += 300;

    const gesamt = BUCHUNG + zeitkosten + kmKosten + sonder;

    // Dauerinfo
    let di = `Dauer: <strong>${tage > 0 ? tage + ' Tag(e) + ' : ''}${restStunden}h</strong> (${stundenGesamt}h gesamt)`;
    di += ueberschreitung ? ` <span class="badge">Max. 36h überschritten!</span>` : ` <span class="badge ok">✓ Gültig</span>`;
    document.getElementById('dauer-info').innerHTML = di;

    let rows = row("Buchungsgebühr", fmt(BUCHUNG));
    if (tage > 0) {
      rows += row(`${tage} × 24h-Pauschale`, fmt(tage * TAG));
      if (restStunden > 0) rows += row(`${restStunden} Reststunde(n) × 3,00 €`, fmt(restStunden * STUNDE));
    } else {
      rows += row(`${stundenGesamt} Stunde(n) × 3,00 €`, fmt(stundenGesamt * STUNDE));
    }
    if (km > 0) rows += row(`${km} km × 0,22 €`, fmt(kmKosten));
    if (sonder > 0) rows += row("Sondergebühren", fmt(sonder));
    rows += `<div class="result-row total"><span class="label">Gesamt</span><span class="value">${fmt(gesamt)}</span></div>`;
    if (ueberschreitung) rows += `<div style="margin-top:10px;background:#7f1d1d;border-radius:6px;padding:8px 10px;font-size:12px;color:#fca5a5;">⚠️ Max. 36h überschritten!</div>`;
    document.getElementById('result-rows').innerHTML = rows;

    return { gesamt, tage, restStunden, stundenGesamt, km };
  }

  function speichern() {
    const res = berechne();
    if (!res) { toast("⚠️ Bitte gültigen Zeitraum eingeben"); return; }
    const eintrag = {
      id: Date.now(),
      start: document.getElementById('start').value,
      end: document.getElementById('end').value,
      km: parseFloat(document.getElementById('km').value) || 0,
      notiz: document.getElementById('notiz').value.trim(),
      gesamt: res.gesamt,
      tage: res.tage,
      restStunden: res.restStunden,
      stundenGesamt: res.stundenGesamt,
      gespeichertAm: new Date().toLocaleString('de-DE')
    };
    const h = ladeHistorie();
    h.unshift(eintrag);
    localStorage.setItem('lauda_historie', JSON.stringify(h));
    toast("✓ In Historie gespeichert!");
  }

  function ladeHistorie() {
    try { return JSON.parse(localStorage.getItem('lauda_historie')) || []; }
    catch { return []; }
  }

  function renderHistorie() {
    const suche = (document.getElementById('suche').value || '').toLowerCase();
    const alle = ladeHistorie();
    const gefiltert = alle.filter(e => {
      const suchText = `${e.notiz} ${e.gespeichertAm} ${fmt(e.gesamt)} ${e.start} ${e.end}`.toLowerCase();
      return suchText.includes(suche);
    });

    document.getElementById('history-count').textContent = `${gefiltert.length} von ${alle.length} Einträgen`;

    if (alle.length === 0) {
      document.getElementById('historie-liste').innerHTML = `<div class="no-history"><div class="icon">📋</div>Noch keine Buchungen gespeichert.<br>Berechne eine Fahrt und tippe auf "Speichern".</div>`;
      return;
    }
    if (gefiltert.length === 0) {
      document.getElementById('historie-liste').innerHTML = `<div class="no-history"><div class="icon">🔍</div>Keine Treffer für "${suche}".</div>`;
      return;
    }

    document.getElementById('historie-liste').innerHTML = gefiltert.map(e => {
      const sd = new Date(e.start);
      const ed = new Date(e.end);
      const startStr = sd.toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      const endStr = ed.toLocaleString('de-DE', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      const dauerStr = e.tage > 0 ? `${e.tage}T + ${e.restStunden}h` : `${e.stundenGesamt}h`;
      return `<div class="history-item">
        <button class="hi-delete" onclick="loeschen(${e.id}, event)">✕</button>
        <div class="hi-title">${e.notiz || 'Buchung'}</div>
        <div class="hi-date">${startStr} → ${endStr}</div>
        <div class="hi-meta">
          <span class="hi-tag price">${fmt(e.gesamt)}</span>
          <span class="hi-tag">⏱ ${dauerStr}</span>
          ${e.km > 0 ? `<span class="hi-tag">🛣 ${e.km} km</span>` : ''}
          <span class="hi-tag">💾 ${e.gespeichertAm}</span>
        </div>
      </div>`;
    }).join('');
  }

  function loeschen(id, event) {
    event.stopPropagation();
    const h = ladeHistorie().filter(e => e.id !== id);
    localStorage.setItem('lauda_historie', JSON.stringify(h));
    renderHistorie();
    toast("Eintrag gelöscht");
  }

  function alleLoeschen() {
    if (!confirm("Wirklich alle Einträge löschen?")) return;
    localStorage.removeItem('lauda_historie');
    renderHistorie();
    toast("Gesamte Historie gelöscht");
  }

  function row(label, value) { return `<div class="result-row"><span class="label">${label}</span><span class="value">${value}</span></div>`; }
  function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

  ['start','end','km'].forEach(id => document.getElementById(id).addEventListener('input', berechne));
  document.querySelectorAll('.sondergebuehren input').forEach(cb => cb.addEventListener('change', berechne));
  berechne();
</script>
</body>
</html>
