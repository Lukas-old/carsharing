<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAUDA Rechner</title>

<!-- PWA / Homescreen -->
<meta name="application-name" content="LAUDA Rechner">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LAUDA Rechner">
<meta name="theme-color" content="#111111">

<!-- App Icon als SVG inline als Data-URL -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23111'/%3E%3Ccircle cx='256' cy='256' r='80' fill='none' stroke='white' stroke-width='18'/%3E%3Ctext x='256' y='278' text-anchor='middle' font-family='Arial' font-weight='900' font-size='110' fill='white'%3E%C2%B0%3C/text%3E%3C/svg%3E">

<!-- Apple Touch Icon (für iOS Homescreen) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23111'/%3E%3Ccircle cx='256' cy='256' r='80' fill='none' stroke='white' stroke-width='18'/%3E%3Ctext x='256' y='278' text-anchor='middle' font-family='Arial' font-weight='900' font-size='110' fill='white'%3E%C2%B0%3C/text%3E%3C/svg%3E">

<!-- Web App Manifest inline -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22LAUDA%20Carsharing%20Rechner%22%2C%22short_name%22%3A%22LAUDA%20Rechner%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111111%22%2C%22theme_color%22%3A%22%23111111%22%7D">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; color: #222; }

  header {
    background: #111;
    color: white;
    padding: 18px 20px 14px;
    text-align: center;
  }
  header .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
  header .logo span { color: #aaa; font-weight: 300; }
  header p { font-size: 13px; color: #aaa; margin-top: 4px; }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card h2 { font-size: 15px; color: #555; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

  label { display: block; font-size: 14px; color: #444; margin-bottom: 4px; margin-top: 12px; }
  input[type="datetime-local"], input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    background: #fafafa;
  }
  input:focus { outline: none; border-color: #111; background: white; }

  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }

  .sondergebuehren { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border: 1.5px solid #eee;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .checkbox-item:hover { border-color: #bbb; }
  .checkbox-item input { width: 18px; height: 18px; cursor: pointer; accent-color: #111; }
  .checkbox-item .item-info { flex: 1; }
  .checkbox-item .item-label { font-size: 14px; }
  .checkbox-item .item-price { font-size: 13px; color: #888; }

  .result-card {
    background: #111;
    color: white;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .result-card h2 { color: #aaa; font-size: 13px; text-transform: uppercase; margin-bottom: 14px; }
  .result-row {
    display: flex; justify-content: space-between;
    font-size: 14px; padding: 6px 0;
    border-bottom: 1px solid #333;
  }
  .result-row:last-of-type { border-bottom: none; }
  .result-row.total {
    font-size: 20px; font-weight: bold;
    border-top: 2px solid #444;
    padding-top: 12px; margin-top: 6px;
    border-bottom: none;
  }
  .result-row .label { color: #ccc; }
  .result-row .value { color: white; font-weight: 500; }
  .result-row.total .value { color: #fff; }

  .hinweis {
    background: #fff8e1;
    border-left: 4px solid #f59e0b;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    color: #666;
    margin-top: 10px;
    margin-bottom: 20px;
  }

  .badge {
    display: inline-block;
    background: #fee2e2;
    color: #b91c1c;
    font-size: 11px;
    font-weight: bold;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge.ok { background: #dcfce7; color: #15803d; }

  /* iOS Homescreen Banner */
  #install-banner {
    display: none;
    background: #1e3a5f;
    color: white;
    padding: 10px 16px;
    font-size: 13px;
    text-align: center;
  }
  #install-banner button {
    background: white;
    color: #1e3a5f;
    border: none;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: bold;
    margin-left: 8px;
    cursor: pointer;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="install-banner">
  📱 Als App speichern: Teilen → "Zum Home-Bildschirm"
  <button onclick="document.getElementById('install-banner').style.display='none'">✕</button>
</div>

<header>
  <div class="logo">°<span>LAUDA</span></div>
  <p>Carsharing Kostenrechner</p>
</header>

<div class="container">

  <div class="card">
    <h2>📅 Buchungszeitraum</h2>
    <div class="row">
      <div>
        <label>Start</label>
        <input type="datetime-local" id="start" />
      </div>
      <div>
        <label>Ende</label>
        <input type="datetime-local" id="end" />
      </div>
    </div>
    <div id="dauer-info" style="margin-top:10px; font-size:13px; color:#666;"></div>
  </div>

  <div class="card">
    <h2>🛣️ Kilometer</h2>
    <label>Geschätzte Fahrtstrecke (km)</label>
    <input type="number" id="km" placeholder="z.B. 50" min="0" value="0" />
  </div>

  <div class="card">
    <h2>⚠️ Sondergebühren</h2>
    <div class="sondergebuehren">
      <label class="checkbox-item">
        <input type="checkbox" data-price="25" />
        <div class="item-info">
          <div class="item-label">Reinigung (unverhältnismäßig)</div>
          <div class="item-price">25,00 €</div>
        </div>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" data-price="75" />
        <div class="item-info">
          <div class="item-label">Reinigung + Desinfektion (Tier, Rauchen)</div>
          <div class="item-price">75,00 €</div>
        </div>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" data-price="15" />
        <div class="item-info">
          <div class="item-label">Missachtung Tankregelung</div>
          <div class="item-price">15,00 €</div>
        </div>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" data-price="10" />
        <div class="item-info">
          <div class="item-label">Verlust/Beschädigung Ladekarte</div>
          <div class="item-price">10,00 €</div>
        </div>
      </label>
      <label class="checkbox-item">
        <input type="checkbox" data-price="120" />
        <div class="item-info">
          <div class="item-label">Schadensabwicklung (Unfall)</div>
          <div class="item-price">120,00 € + 300 € Selbstbeteiligung</div>
        </div>
      </label>
    </div>
  </div>

  <div class="result-card">
    <h2>💶 Kostenschätzung</h2>
    <div id="result-rows">
      <div class="result-row">
        <span class="label">Bitte Zeitraum eingeben</span>
        <span class="value">–</span>
      </div>
    </div>
  </div>

  <div class="hinweis">
    ℹ️ Max. Buchungsdauer: <strong>36 Stunden</strong>. Strom inklusive. Alle Preise inkl. MwSt. Stand Januar 2023.
  </div>

</div>

<script>
  const STUNDE = 3.00;
  const TAG = 30.00;
  const KM = 0.22;
  const BUCHUNG = 0.50;

  function pad(n) { return String(n).padStart(2,'0'); }

  function now() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  document.getElementById('start').value = now();
  const endD = new Date(Date.now() + 2*3600000);
  document.getElementById('end').value = `${endD.getFullYear()}-${pad(endD.getMonth()+1)}-${pad(endD.getDate())}T${pad(endD.getHours())}:${pad(endD.getMinutes())}`;

  // iOS Banner anzeigen
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('install-banner').style.display = 'block';
  }

  // Android Install Prompt
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    banner.style.display = 'block';
    banner.innerHTML = '📱 Als App installieren? <button id="install-btn">Installieren</button> <button onclick="this.parentElement.style.display=\'none\'">✕</button>';
    document.getElementById('install-btn').addEventListener('click', () => {
      deferredPrompt.prompt();
      banner.style.display = 'none';
    });
  });

  function berechne() {
    const start = new Date(document.getElementById('start').value);
    const end = new Date(document.getElementById('end').value);
    const km = parseFloat(document.getElementById('km').value) || 0;

    if (!document.getElementById('start').value || !document.getElementById('end').value) return;
    if (end <= start) {
      document.getElementById('result-rows').innerHTML = `<div class="result-row"><span class="label" style="color:#f87171;">Ende muss nach Start liegen</span></div>`;
      document.getElementById('dauer-info').innerHTML = '';
      return;
    }

    const diffMs = end - start;
    const diffH = diffMs / 3600000;
    const tage = Math.floor(diffH / 24);
    const restStunden = Math.ceil(diffH - tage * 24);
    const stunden = Math.ceil(diffH);
    const ueberschreitung = diffH > 36;

    let zeitkosten = tage * TAG + restStunden * STUNDE;
    const nurStundlich = stunden * STUNDE;
    if (nurStundlich < zeitkosten) zeitkosten = nurStundlich;

    const kmKosten = km * KM;

    let sonder = 0;
    document.querySelectorAll('.sondergebuehren input[type=checkbox]').forEach(cb => {
      if (cb.checked) sonder += parseFloat(cb.dataset.price);
    });
    // Selbstbeteiligung extra wenn Unfall
    const unfall = document.querySelectorAll('.sondergebuehren input[type=checkbox]')[4].checked;
    if (unfall) sonder += 300;

    const gesamt = BUCHUNG + zeitkosten + kmKosten + sonder;

    let dauerText = `Dauer: <strong>${tage > 0 ? tage + ' Tag(e) + ' : ''}${restStunden}h</strong> (${stunden}h gesamt)`;
    dauerText += ueberschreitung
      ? ` <span class="badge">Max. 36h überschritten!</span>`
      : ` <span class="badge ok">✓ Gültig</span>`;
    document.getElementById('dauer-info').innerHTML = dauerText;

    let rows = '';
    rows += row("Buchungsgebühr", fmt(BUCHUNG));
    if (tage > 0) {
      rows += row(`${tage} × 24h-Pauschale`, fmt(tage * TAG));
      if (restStunden > 0) rows += row(`${restStunden} Reststunde(n) × 3,00 €`, fmt(restStunden * STUNDE));
    } else {
      rows += row(`${stunden} Stunde(n) × 3,00 €`, fmt(stunden * STUNDE));
    }
    if (km > 0) rows += row(`${km} km × 0,22 €`, fmt(kmKosten));
    if (sonder > 0) rows += row("Sondergebühren", fmt(sonder));
    rows += `<div class="result-row total"><span class="label">Gesamt</span><span class="value">${fmt(gesamt)}</span></div>`;
    if (ueberschreitung) rows += `<div style="margin-top:10px;background:#7f1d1d;border-radius:6px;padding:8px 10px;font-size:12px;color:#fca5a5;">⚠️ Maximale Buchungsdauer von 36h überschritten!</div>`;

    document.getElementById('result-rows').innerHTML = rows;
  }

  function row(label, value) {
    return `<div class="result-row"><span class="label">${label}</span><span class="value">${value}</span></div>`;
  }
  function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

  ['start','end','km'].forEach(id => document.getElementById(id).addEventListener('input', berechne));
  document.querySelectorAll('.sondergebuehren input').forEach(cb => cb.addEventListener('change', berechne));
  berechne();
</script>
</body>
</html>
